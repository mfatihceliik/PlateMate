spring.application.name=platemate

# Database connection settings
spring.datasource.url=jdbc:postgresql://localhost:5432/PlateMate
spring.datasource.username=postgres
spring.datasource.password=123456

# 2. Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. PostGre driver
spring.datasource.driver-class-name=org.postgresql.Driver

# 4. JWT Settings
# IMPORTANT: Production'da bu secret en az 256-bit (32 karakter) ve güvenli olmalı!
# Bu değeri environment variable ile yönetmeyi düşün.
jwt.secret=PlateMateSecretKeyForJWTTokenGeneration2026!
jwt.expiration-ms=86400000
